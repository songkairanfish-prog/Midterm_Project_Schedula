<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedula - Feedback</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./style.css">

</head>
<body class="bg-gray-800 min-h-screen">

    <div id="app" class="flex flex-col md:flex-row min-h-screen">

        <!-- Mobile Header -->
        <header class="md:hidden bg-gray-800 text-gray-200 px-5 py-5 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 rounded-full bg-gray-600">
                    <img src="./picture/Schedula_Logo.png" class="w-[95%] h-[95%] object-cover flex justify-center items-center" alt="Schedula_Logo">
                </div>
                <h1 class="text-2xl">Schedula</h1>
            </div>
            <button id="menu-btn" class="w-12 h-12 rounded-full border-2 border-gray-200 text-3xl flex items-center justify-center pb-1.5">
                ☰
            </button>
        </header>

        <!-- Mobile Menu -->
        <nav id="mobile-menu" class="hidden md:hidden font-semibold flex flex-col gap-3 bg-gray-800 text-gray-200 px-5 pb-5">
            <a href="index.html" class="block text-xl">Main Page</a>
            <a href="allEvents.html" class="block text-xl">All Events</a>
            <a href="aboutMe.html" class="block text-xl">About Me</a>
            <a href="feedBack.html" class="block rounded-2xl p-2 border border-white text-xl">Feedback</a>
        </nav>

        <!-- Desktop Sidebar -->
        <aside class="hidden md:flex w-64 fixed h-screen bg-gray-800 flex-col">
            <div class="Navigation w-full flex-1 flex flex-col mt-8 pl-8 text-gray-200">

                <div class="Logo w-full h-24 flex items-center gap-3 mb-6">
                    <div class="w-[70px] h-[70px] bg-gray-600 rounded-full">
                        <img src="./picture/Schedula_Logo.png" class="w-[95%] h-[95%] object-cover flex justify-center items-center" alt="Schedula_Logo">
                    </div>
                    <h1 class="text-2xl text-gray-200">Schedula</h1>
                </div>

                <div class="w-full py-4 flex items-center">
                    <a href="index.html"><h1 class="text-xl">+ Main Page</h1></a>
                </div>

                <div class="w-full py-4 flex items-center">
                    <a href="allEvents.html"><h1 class="text-xl">+ All Events</h1></a>
                </div>

                <div class="w-full py-4 flex items-center">
                    <a href="aboutMe.html"><h1 class="text-xl">+ About Me</h1></a>
                </div>

                <div class="w-full py-4 flex items-center">
                    <a href="feedBack.html"><h1 class="text-xl font-bold text-white">- Feedback</h1></a>
                </div>

            </div>

        </aside>

        <!-- Main Content -->
        <main class="bg-gray-100 overflow-y-auto min-h-screen md:h-screen p-4 md:p-8 flex-1 mt-4 md:mt-8 mb-4 md:mb-8 mx-4 md:mr-8 md:ml-72 rounded-3xl shadow-lg">

            <h1 class="text-3xl text-center font-bold mb-2">Feedback</h1>
            <p class="text-gray-500 text-center mb-8">Got thoughts? We'd love to hear them. Help us make Schedula better.</p>

            <div class="bg-white rounded-2xl shadow-sm p-6 max-w-2xl mx-auto flex flex-col">

                <!-- Name -->
                <div class="mb-5">
                    <label for="name" class="block text-sm font-semibold text-gray-600 mb-1.5">Name</label>
                    <input
                        type="text"
                        id="name"
                        name="name"
                        placeholder="Your name"
                        class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl text-gray-800 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-gray-400 transition"
                    >
                </div>

                <!-- Email -->
                <div class="mb-5">
                    <label for="email" class="block text-sm font-semibold text-gray-600 mb-1.5">Email</label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="your@email.com"
                        class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl text-gray-800 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-gray-400 transition"
                    >
                </div>

                <!-- Rating -->
                <div class="mb-5">
                    <label class="block text-sm font-semibold text-gray-600 mb-2">How would you rate Schedula?</label>
                    <div class="flex gap-2" id="star-rating">
                        <span class="star text-3xl cursor-pointer text-gray-300 hover:text-yellow-400 transition" data-value="1">★</span>
                        <span class="star text-3xl cursor-pointer text-gray-300 hover:text-yellow-400 transition" data-value="2">★</span>
                        <span class="star text-3xl cursor-pointer text-gray-300 hover:text-yellow-400 transition" data-value="3">★</span>
                        <span class="star text-3xl cursor-pointer text-gray-300 hover:text-yellow-400 transition" data-value="4">★</span>
                        <span class="star text-3xl cursor-pointer text-gray-300 hover:text-yellow-400 transition" data-value="5">★</span>
                    </div>
                </div>

                <!-- Message -->
                <div class="mb-6">
                    <label for="message" class="block text-sm font-semibold text-gray-600 mb-1.5">Message</label>
                    <textarea
                        id="message"
                        name="message"
                        rows="5"
                        placeholder="Tell us what you think..."
                        class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl text-gray-800 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-gray-400 transition resize-none"
                    ></textarea>
                </div>

                <!-- Submit -->
                <button
                    type="button"
                    class="bg-gray-800 text-white px-6 py-2.5 rounded-xl font-semibold hover:bg-gray-700 active:scale-95 transition-all duration-200"
                >
                    Send Feedback
                </button>

            </div>

            <!-- Footer -->
            <footer class="mt-8 pt-6 pb-4 border-t border-gray-300 flex justify-between items-center px-2 text-sm text-gray-500">
                <p class="font-semibold text-gray-700">Schedula</p>
                <p>Sok Korsovan - RUPP | 2026</p>
            </footer>

        </main>

    </div>

    <script>
        // Hamburger menu toggle
        const menuBtn = document.getElementById('menu-btn');
        const mobileMenu = document.getElementById('mobile-menu');

        menuBtn.addEventListener('click', () => {
            mobileMenu.classList.toggle('hidden');
        });

        // Star rating interaction - Claude.ai
        const stars = document.querySelectorAll('.star');
        let selectedRating = 0;

        stars.forEach(star => {
            star.addEventListener('mouseover', () => {
                const val = parseInt(star.dataset.value);
                stars.forEach(s => {
                    s.classList.toggle('text-yellow-400', parseInt(s.dataset.value) <= val);
                    s.classList.toggle('text-gray-300', parseInt(s.dataset.value) > val);
                });
            });

            star.addEventListener('mouseout', () => {
                stars.forEach(s => {
                    s.classList.toggle('text-yellow-400', parseInt(s.dataset.value) <= selectedRating);
                    s.classList.toggle('text-gray-300', parseInt(s.dataset.value) > selectedRating);
                });
            });

            star.addEventListener('click', () => {
                selectedRating = parseInt(star.dataset.value);
            });
        });
    </script>

</body>
</html>
