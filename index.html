<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedula</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./style.css">

</head>
<body class="bg-gray-800 min-h-screen">

    <div id="app" class="flex flex-col md:flex-row min-h-screen">

        <header class="md:hidden bg-gray-800 text-gray-200 px-5 py-5 flex items-center justify-between">

            <div class="flex items-center gap-3">
                <div class="w-12 h-12 rounded-full bg-gray-600">
                    <img src="./picture/Schedula_Logo.png" class="w-[95%] h-[95%] object-cover flex justify-center items-center" alt="Schedula_Logo">
                </div>
                <h1 class="text-2xl">Schedula</h1>
            </div>

            <button id="menu-btn" class="w-12 h-12 rounded-full border-2 border-gray-200 text-3xl flex items-center justify-center pb-1.5">
                ☰
            </button>

        </header>
 
        <nav id="mobile-menu" class="hidden md:hidden font-semibold flex flex-col gap-3 bg-gray-800 text-gray-200 px-5 pb-5">

            <a href="index.html" class="block text-xl rounded-2xl p-2 border border-white">Main Page</a>
            <a href="allEvents.html" class="block text-xl">All Events</a>
            <a href="aboutMe.html" class="block text-xl">About Me</a>

        </nav>

        <aside class="hidden md:flex w-64 fixed h-screen bg-gray-800 flex flex-col">

            <div class="Navigation w-full flex-1 flex flex-col mt-8 pl-8 text-gray-200">

                <div class="Logo w-full h-24 flex items-center gap-3 mb-6">

                    <div class="w-[70px] h-[70px] bg-gray-600 rounded-full">
                        <img src="./picture/Schedula_Logo.png" class="w-[95%] h-[95%] object-cover flex justify-center items-center" alt="Schedula_Logo">
                    </div>
                    <h1 class="text-2xl text-gray-200">Schedula</h1>

                </div>

                <div class="Main_Page w-full py-4 flex items-center">

                    <a href="index.html"><h1 class="text-xl">- Main Page</h1></a>

                </div>

                <div class="All_Events w-full py-4 flex items-center">

                    <a href="allEvents.html"><h1 class="text-xl">+ All Events</h1></a>
                    
                </div>

                <div class="About_Me w-full py-4 flex items-center">

                    <a href="aboutMe.html"><h1 class="text-xl">+ About Me</h1></a>
                    
                </div>

            </div>
            
        </aside>



        <main class="bg-gray-100 overflow-y-auto min-h-screen md:h-screen flex-1 mt-4 md:mt-8 mb-4 md:mb-8 mx-4 md:mr-8 md:ml-72 rounded-3xl shadow-lg">

            <div class="p-4 md:p-6 flex flex-col">

                <div class="w-full flex justify-center flex-col gap-3 md:h-[50px] md:flex-row">

                    <div class="w-full md:w-[53.33%] flex-1 flex flex-row justify-between gap-2">

                        <div class="w-[35%] flex items-center justify-end">

                            <button id="prev-btn" class="w-14 h-12 pb-1 rounded-full text-4xl font-bold hover:scale-125 transition-transform duration-200">
                                <
                            </button>

                        </div>

                        <div class="w-[30%] flex items-center justify-center">
                            <!--This is the middle month and year-->
                            <div id="month-label" class="w-full h-12 rounded-full flex items-center justify-center px-2">

                                <p id="month-text" class="text-2xl md:text-3xl text-center"></p>

                            </div>

                        </div>

                        <div class="w-[35%] flex items-center justify-start">

                            <button id="next-btn" class="w-14 h-12 pb-1 rounded-full text-4xl font-bold hover:scale-125 transition-transform duration-200">
                                >
                            </button>

                        </div>

                    </div>

                    

                </div>


                <div class="px-2 md:px-10">

                    <!-- Grid 1: Headers -->
                    <div class="Calender_grid grid grid-cols-7 flex rounded-tl-3xl border-t-2 border-l-2 border-r-2 border-gray-800 rounded-tr-3xl mt-10 md:mt-16 pt-4 md:pt-6 bg-gray-100">
                    
                        <div class="text-sm md:text-2xl text-center rounded-2xl mx-1 md:mx-5">Mon</div>
                        <div class="text-sm md:text-2xl text-center rounded-2xl mx-1 md:mx-5">Tue</div>
                        <div class="text-sm md:text-2xl text-center rounded-2xl mx-1 md:mx-5">Wed</div>
                        <div class="text-sm md:text-2xl text-center rounded-2xl mx-1 md:mx-5">Thu</div>
                        <div class="text-sm md:text-2xl text-center rounded-2xl mx-1 md:mx-5">Fri</div>
                        <div class="text-sm md:text-2xl text-center rounded-2xl mx-1 md:mx-5">Sat</div>
                        <div class="text-sm md:text-2xl text-center rounded-2xl mx-1 md:mx-5">Sun</div>
                
                    </div>

                    <div id="calendar-grid" class="grid grid-cols-7 rounded-bl-3xl border-b-2 border-l-2 border-r-2 border-gray-800 rounded-br-3xl pb-5 shadow-lg bg-gray-100">

                    </div>

                    <div class="w-full h-6 mt-6 md:mt-8 flex justify-center items-center">
                        <div class="w-[70%] h-[50%] flex rounded-3xl border-2 border-gray-800"></div>
                    </div>

                    <div id="day-panel" class="mt-8 px-4 md:px-5 pb-10 pt-5 w-full flex-1 border-2 border-gray-800 rounded-3xl bg-gray-100 hidden">
                        
                    </div>

                </div>
                
            </div>

            <footer class="mt-auto pt-6 pb-4 border-t border-gray-300 flex justify-between items-center px-6 text-sm text-gray-500">
                <p class="font-semibold text-gray-700">Schedula</p>
                <p>Sok Korsovan - RUPP | 2026</p>
            </footer>

        </main>
        
    </div>

</body>

<script src="./script.js"></script>

</html>
