<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedula</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./style.css">

</head>
<body class="bg-gray-800 min-h-screen">

    <div id="app" class="flex min-h-screen">

        

        <aside class="w-64 fixed h-screen bg-gray-800 flex flex-col">

            <div class="Navigation w-full flex-1 flex flex-col mt-8 pl-8 text-gray-200">

                <div class="Logo w-full h-24 flex items-center gap-3 mb-6">

                    <div class="w-[70px] h-[70px] bg-gray-100 rounded-full"></div>
                    <h1 class="text-2xl text-gray-200">Schedula</h1>

                </div>

                <div class="Main_Page w-full py-4 flex items-center">

                    <a href="index.html"><h1 class="text-xl">- Main Page</h1></a>

                </div>

                <div class="All_Events w-full py-4 flex items-center">

                    <a href="allEvents.html"><h1 class="text-xl">+ All Events</h1></a>
                    
                </div>

                <div class="About_Me w-full py-4 flex items-center">

                    <a href="aboutMe.html"><h1 class="text-xl">+ About Me</h1></a>
                    
                </div>

            </div>
            
        </aside>



        <main class="bg-gray-100 overflow-y-auto h-screen flex-1 mt-8 mb-8 mr-8 ml-72 rounded-3xl shadow-lg">

            <div class="p-6 flex flex-col">

                <div class="w-full h-[50px] flex flex-row">

                    <div class="w-[23.33%] flex-1">

                        <button class="w-12 h-12 rounded-full ml-1 text-3xl text-white border bg-gray-900 ">
                            O
                        </button>

                    </div>

                    <div class="w-[53.33%] flex-1 flex flex-row justify-between ">

                        <div class="flex-1 mr-1 flex items-center justify-center">

                            <button id="prev-btn" class="w-16 h-12 pb-1 rounded-full text-4xl font-bold">
                                <
                            </button>

                        </div>

                        <div class="w-full flex items-center justify-center">
                            <!--This is the middle month and year-->
                            <div id="month-label" class="w-full h-12 rounded-full flex items-center justify-center">

                                <p id="month-text" class="text-3xl">May 2026</p>

                            </div>

                        </div>

                        <div class="flex-1 ml-1 flex items-center justify-center">

                            <button id="next-btn" class="w-16 h-12 pb-1 rounded-full text-4xl font-bold">
                                >
                            </button>

                        </div>

                    </div>

                    <div class="flex-1 flex justify-end">

                        <div class="w-36 h-12 rounded-full flex flex-row mr-1 text-center border-2 border-black">

                            <button class="w-[50%] h-[100%] text-3xl">
                                Y
                            </button>

                            <button class="w-[50%] h-[100%] text-3xl">
                                M
                            </button>

                        </div>

                    </div>

                </div>


                <div class="px-10">

                    <!-- Grid 1: Headers -->
                    <div class="Calender_grid grid grid-cols-7 flex rounded-tl-3xl border-t-2 border-l-2 border-r-2 border-gray-800 rounded-tr-3xl mt-16 pt-6 bg-gray-100">
                    
                        <div class="text-2xl text-center rounded-2xl ml-5 mr-5">Mon</div>
                        <div class="text-2xl text-center rounded-2xl ml-5 mr-5">Tue</div>
                        <div class="text-2xl text-center rounded-2xl ml-5 mr-5">Wed</div>
                        <div class="text-2xl text-center rounded-2xl ml-5 mr-5">Thu</div>
                        <div class="text-2xl text-center rounded-2xl ml-5 mr-5">Fri</div>
                        <div class="text-2xl text-center rounded-2xl ml-5 mr-5">Sat</div>
                        <div class="text-2xl text-center rounded-2xl ml-5 mr-5">Sun</div>
                
                    </div>

                    <div id="calendar-grid" class="grid grid-cols-7 rounded-bl-3xl border-b-2 border-l-2 border-r-2 border-gray-800 rounded-br-3xl pb-5 shadow-lg bg-gray-100">

                    </div>

                    <div class="w-full h-6 mt-8 flex justify-center items-center">
                        <div class="w-[70%] h-[50%] flex rounded-3xl border-2 border-gray-800"></div>
                    </div>

                    <div id="day-panel" class="mt-8 px-5 pb-10 pt-5 w-full flex-1 border-2 border-gray-800 rounded-3xl bg-gray-100 hidden">
                        
                    </div>

                </div>
                
            </div>

            <footer class="mt-8 mb-4 text-center text-gray-600">
                <p>Schedula | Sok Korsovan | 2026</p>
            </footer>

        </main>
        
    </div>

</body>

<script src="./script.js"></script>

</html>
